<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2b5ab5" />
  <title>Offline - Acadrix</title>
  <link rel="icon" href="/favicon.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f8f9fa;
      color: #191c1d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      text-align: center;
      background: #ffffff;
      padding: 40px 32px;
      border-radius: 24px;
      box-shadow: 0 32px 64px -12px rgba(0, 0, 0, 0.08);
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: #2b5ab5;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: #ffffff;
      font-size: 32px;
      font-weight: 800;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #5b5e60;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .hint {
      font-size: 12px;
      color: #8a8d8f;
    }
    button {
      width: 100%;
      background: #2b5ab5;
      color: #ffffff;
      border: none;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    button:hover {
      background: #224a9c;
      transform: translateY(-1px);
    }
    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">A</div>
    <h1>You're offline</h1>
    <p>Acadrix needs an internet connection to load this page. Check your network and try again.</p>
    <button onclick="location.reload()">Try Again</button>
    <p class="hint" style="margin-top: 16px; margin-bottom: 0;">
      Pages you've already visited will still work.
    </p>
  </div>
  <script>
    // Auto-reload when the network comes back
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
