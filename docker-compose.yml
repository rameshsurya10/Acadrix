# Acadrix - local development stack
#
# Usage:
#   docker compose up --build
#   docker compose down
#
# Note: backend runs `migrate` on every start. This is fine for local dev.
# In production, run migrations as a separate one-shot job, not on every container start.

services:
  postgres:
    image: postgres:16-alpine
    container_name: acadrix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-acadrix}
      POSTGRES_USER: ${DB_USER:-acadrix}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-acadrix_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-acadrix}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: acadrix-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acadrix-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: &backend_env
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-acadrix}
      DB_USER: ${DB_USER:-acadrix}
      DB_PASSWORD: ${DB_PASSWORD:-acadrix_dev_password}
      DB_SSLMODE: disable
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
    ports:
      - "8000:8000"
    volumes:
      - backend_media:/app/media
    entrypoint: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application
               --bind 0.0.0.0:8000
               --workers 3
               --timeout 60
               --access-logfile -
               --error-logfile -"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acadrix-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *backend_env
    volumes:
      - backend_media:/app/media
    entrypoint: >
      sh -c "celery -A config worker
               --loglevel=info
               --concurrency=4
               --max-tasks-per-child=100"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acadrix-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  backend_media:
